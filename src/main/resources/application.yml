spring:
  datasource:
    url: jdbc:h2:tcp://localhost/~/assignment;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 1234
  h2:
    console:
      enabled: true
  jpa:
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        dialect.storage_engine: innodb
    show-sql: true
    hibernate:
      ddl-auto: create

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH2_GOOGLE_CLIENT_ID}
            client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

security:
  jwt:
    secret: ${JWT_SECRET:secret}
    access-token-expires-in-seconds: 1800     # 30분
    refresh-token-expires-in-seconds: 1209600 # 2주

client:
  oauth2-redirect-uri: http://localhost:3000/auth/callback